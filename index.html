<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="/assets/css/styles.css">

    <!-- Favicon -->
    <link rel="shortcut icon" href="/assets/images/favicon.png" type="image/x-icon">

    <title>Intro Canvas 2D</title>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-expand-lg bg-dark shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">
                Canvas 2D con OOP
            </span>

            <div class="text-light">
                Programador: <strong>Jesús</strong>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container flex-column mt-4 shadow rounded-3 p-4 bg-white">

        <div class="d-flex justify-content-center flex-row mb-4">
            <h1>Objetos 2D mediante OOP</h1>
        </div>

        <div class="d-flex flex-row shadow-sm mb-1 p-3 justify-content-around flex-wrap">

            <div class="d-flex justify-content-center flex-column mb-3 align-items-center">
                <h5>Objeto 2D</h5>
                <canvas class="border shadow canvas-style" id="canvasOOP"></canvas>
            </div>

            <div class="d-flex justify-content-center flex-column mb-3 align-items-center">
                <h5>Objeto con Random</h5>
                <canvas class="border shadow canvas-style" id="canvasRandom"></canvas>
            </div>

            <div class="d-flex justify-content-center flex-column mb-3 align-items-center">
                <h5>Múltiples objetos</h5>
                <canvas class="border shadow canvas-style" id="canvasMultiple"></canvas>
            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-light text-center p-3 mt-4">
        <div class="container">
            <p class="mb-1">Práctica: Introducción a Canvas 2D con Programación Orientada a Objetos</p>
            <p class="mb-0">Desarrollado por <strong>Jesús</strong> | Ingeniería en Sistemas</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

    <!-- JS principal -->
    <script src="/assets/js/main.js"></script>

</body>

</html>
